<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Added: Prevents zooming issues on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation - Farid & Nur</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #2d4a27;
            --bg-color: #f9fbf9;
            --accent-brown: #4a341b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #d1dbd1;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centers card vertically on all screens */
        }

        .invitation-card {
            /* Responsive phone width */
            width: 95vw; 
            max-width: 450px; 
            min-height: 90vh; /* Mimics the long phone screen feel */
            
            background-color: var(--bg-color);
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 60px 25px; /* Reduced side padding for small screens */
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            text-align: center;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Flower Assets - Adjusted for mobile scale */
        .flower {
            position: absolute;
            width: 220px; 
            z-index: 1;
            pointer-events: none;
            opacity: 0.9;
        }
        
        .top-left { top: -40px; left: -60px; }
        .top-right { top: -10px; right: -80px; }
        
        .bottom-left { 
            bottom: -10px; 
            left: -60px; 
            transform: rotate(90deg); 
        }
        
        .bottom-right { 
            bottom: -10px; 
            right: -60px; 
            transform: rotate(90deg) scaleX(-1); 
        }

        .content {
            position: relative;
            z-index: 3;
        }

        .bismillah {
            font-size: 28px;
            margin-bottom: 12px;
            color: var(--dark-green);
        }

        .intro-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dark-green);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 65px; /* Scaled down for mobile */
            color: var(--dark-green);
            margin: 5px 0;
            line-height: 1;
        }

        .pengantin {
            width: 100%;
            max-width: 280px;
            margin: 10px auto;
            display: block;
            transform: scaleX(-1); 
            opacity: 0.8; 
            mix-blend-mode: multiply;
        }

        .date-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            color: var(--accent-brown);
        }

        .side-label {
            flex: 1;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            border-top: 1px solid var(--accent-brown);
            border-bottom: 1px solid var(--accent-brown);
            padding: 8px 0;
            text-transform: uppercase;
        }

        .center-date {
            padding: 0 15px;
            text-align: center;
        }

        .month-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .day-number {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            line-height: 0.8;
            display: block;
        }

        .year-label {
            display: block;
            font-size: 11px;
            letter-spacing: 4px;
            font-weight: 600;
            margin-top: 8px;
        }

        .location-info {
            font-size: 12px;
            color: var(--accent-brown);
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.4;
            max-width: 280px;
            margin: 15px auto;
            text-transform: uppercase;
        }

        .btn-location {
            display: inline-block;
            margin-top: 10px;
            background-color: var(--accent-brown);
            color: #fff;
            padding: 12px 35px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Extra small phone adjustment */
        @media (max-width: 370px) {
            .names { font-size: 55px; }
            .flower { width: 180px; }
            .day-number { font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <!-- Flowers -->
        <img src="flo1.png" class="flower top-left" alt="">
        <img src="flo2.png" class="flower top-right" alt="">
        <img src="flo3.png" class="flower bottom-left" alt="">
        <img src="flo3.png" class="flower bottom-right" alt="">

        <div class="content">
            <div class="bismillah">﷽</div>
            
            <p class="intro-text">
                In The Name Of Allah The Most Beneficent<br>And The Most Merciful<br><br>
                Please Join Us To Celebrate The Wedding Of:
            </p>

            <h1 class="names">Farid &<br>Nur Najjat</h1>

            <img src="pelamin.png" class="pengantin" alt="Wedding Couple">

            <div class="date-container">
                <div class="side-label">Thursday</div>
                <div class="center-date">
                    <span class="month-label">August</span>
                    <span class="day-number">02</span>
                    <span class="year-label">2026</span>
                </div>
                <div class="side-label">at 8am</div>
            </div>

            <div class="location-info">
                NO. 3121, TAMAN KUNAK KAYA,<br>LORONG 1, KUNAK, SABAH
            </div>

            <a href="https://maps.app.goo.gl/1Kmz8w5hyboASp4M9" class="btn-location">Location</a>
        </div>
    </div>

</body>
</html>
